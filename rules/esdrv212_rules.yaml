# ESRD Pricing Rules: DRIVER VALIDATION & ROUTING (ESDRV212)
---
- rule_id: DRV-001
  name: Date Cut-off Validation
  description: Reject claims billed before the historical cut-off of 20050401 or invalid numeric dates.
  priority: 100
  policy_refs:
    - "Internal/No policy citation found"
  conditions:
    - B_THRU_DATE < 20050401 OR B_THRU_DATE is NOT NUMERIC
  actions:
    - set: 
        variable: PPS_RTC
        value: 98
    - command: EXIT
---
- rule_id: DRV-002
  name: Exception Rate Validation
  description: Ensure the exception rate is a valid numeric.
  priority: 90
  policy_refs:
    - "Internal/No policy citation found"
  conditions:
    - P_ESRD_RATE is NOT NUMERIC
  actions:
    - set:
        variable: PPS_RTC
        value: 50
    - command: EXIT
---
- rule_id: DRV-003
  name: Pre-2011 Blended Payment Override
  description: Honor Exception Rate for pre-2011 claims directly, bypassing standard PPS.
  priority: 80
  policy_refs:
    - "Pub 100-02 Ch 11 §70 (ESRD PPS Transition Period / Exception Rates)"
  conditions:
    - B_THRU_DATE < 20110101
    - P_ESRD_RATE > 0
  actions:
    - map:
        variable: PPS_FINAL_PAY_AMT
        from: P_ESRD_RATE
    - set:
        variable: PPS_RTC
        value: 1
    - command: EXIT
---
- rule_id: DRV-004
  name: Pacific Island Trust Territories Override (2011-2013)
  description: Honor Exception Rate for Pacific Island Trust Territories during the transition period.
  priority: 70
  policy_refs:
    - "Pub 100-02 Ch 11 §70 (ESRD PPS Transition Period / Exception Rates)"
  conditions:
    - B_THRU_DATE >= 20110101
    - B_THRU_DATE <= 20131231
    - P_PACIFIC_IS_TRUST_TERR == "2"
    - P_ESRD_RATE > 0
  actions:
    - map:
        variable: PPS_FINAL_PAY_AMT
        from: P_ESRD_RATE
    - set:
        variable: PPS_RTC
        value: 1
    - command: EXIT
---
