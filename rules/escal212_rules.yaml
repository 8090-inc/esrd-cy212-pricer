- rule_id: CAL-023
  name: Low Volume Recovery Payments
  description: Calculate low-volume recovery payments and adjust outlier amounts.
  priority: 42
  policy_refs:
    - "Pub 100-02 Ch 11 §60 (Low-volume adjustment)"
  conditions:
    - LOW_VOLUME_TRACK == "Y"
  actions:
    - define_strategy:
        strategy_name: Low Volume Recovery
        description: "Compute low-volume full PPS and outlier payments, then net against standard values."
        steps:
          - "Compute H_LV_PPS_FINAL_PAY_AMT using low-volume multipliers."
          - "Compute H_LV_OUT_PAYMENT using low-volume outlier logic."
          - "H_LV_PPS_FINAL_PAY_AMT = H_LV_PPS_FINAL_PAY_AMT - H_PPS_FINAL_PAY_AMT"
          - "H_LV_OUT_PAYMENT = H_LV_OUT_PAYMENT - H_OUT_PAYMENT"
          - "H_LV_PPS_FINAL_PAY_AMT = H_LV_PPS_FINAL_PAY_AMT + H_LV_OUT_PAYMENT"
